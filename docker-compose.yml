version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: black2-backend
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./backend/data:/app/backend/data
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=sqlite:///./data/black2.db
      - LOG_LEVEL=INFO
      # GitHub锚定配置（从.env文件加载）
      - ANCHOR_GITHUB_TOKEN=${ANCHOR_GITHUB_TOKEN}
      - ANCHOR_GITHUB_REPO_URL=${ANCHOR_GITHUB_REPO_URL}
      - ANCHOR_GITHUB_BRANCH=${ANCHOR_GITHUB_BRANCH}
      # JWT配置
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - black2-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 前端服务（开发环境）
  frontend-dev:
    image: node:18-alpine
    container_name: black2-frontend-dev
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - black2-network
    profiles:
      - dev  # 仅在开发时启动

  # 前端服务（生产环境 - Nginx）
  frontend-prod:
    image: nginx:alpine
    container_name: black2-frontend-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - black2-network
    restart: unless-stopped
    profiles:
      - prod  # 仅在生产时启动

networks:
  black2-network:
    driver: bridge

volumes:
  backend-data:
